<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYOFNC - Sistema de Controle</title>
    
    <!-- SDK do Appwrite -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #c61d41; margin-bottom: 8px; font-size: 28px; }
        p { color: #666; margin-bottom: 24px; }
        input { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: #c61d41; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.3s; }
        button:hover { background-color: #a51836; }
        button:disabled { background-color: #ccc; }
        .error-msg { color: #d93025; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>CRYOFNC</h1>
        <p>Acesso Cryotronics</p>
        
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="password" placeholder="Senha" required>
        
        <button id="btnEntrar" onclick="fazerLogin()">Entrar no Sistema</button>
        <div id="mensagemErro" class="error-msg"></div>
    </div>

    <script>
        // Configuração com o Endpoint de Nova York corrigido
        const client = new Appwrite.Client()
            .setEndpoint('https://nyc.cloud.appwrite.io/v1') // Correção para image_ee28fd.png
            .setProject('69f0c2ac0039982cc56a');

        const account = new Appwrite.Account(client);

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnEntrar');
            const msgErro = document.getElementById('mensagemErro');

            if (!email || !password) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            // Interface de carregamento
            btn.disabled = true;
            btn.innerText = "Conectando...";
            msgErro.style.display = "none";

            try {
                // Tenta criar a sessão
                await account.createEmailPasswordSession(email, password);
                
                alert("Acesso autorizado!");
                // Certifique-se de que este arquivo 'dashboard.html' existe no seu GitHub
                window.location.href = "dashboard.html"; 

            } catch (error) {
                console.error("Erro detalhado:", error);
                btn.disabled = false;
                btn.innerText = "Entrar no Sistema";
                msgErro.style.display = "block";

                // Tradução de erros comuns
                if (error.code === 401) {
                    msgErro.innerText = "E-mail ou senha incorretos.";
                } else if (error.code === 403) {
                    msgErro.innerText = "Projeto bloqueado ou região inválida.";
                } else {
                    msgErro.innerText = "Erro: " + error.message;
                }
            }
        }

        // Atalho para o teclado Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fazerLogin();
        });
    </script>
</body>
</html>
