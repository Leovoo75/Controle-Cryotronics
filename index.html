<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYOFNC - Login</title>
    
    <!-- Link alternativo para evitar bloqueios do navegador -->
    <script src="https://unpkg.com/appwrite@14.0.1/dist/iife/sdk.bundle.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        h1 { color: #c61d41; margin-bottom: 0.5rem; font-size: 2rem; }
        p { color: #666; margin-bottom: 2rem; }
        input { width: 100%; padding: 14px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background-color: #c61d41; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.2s; }
        button:hover { background-color: #a51836; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .error-message { color: #d93025; font-size: 0.9rem; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>CRYOFNC</h1>
        <p>Acesso Cryotronics</p>
        
        <input type="email" id="email" placeholder="Seu e-mail" required>
        <input type="password" id="password" placeholder="Sua senha" required>
        
        <button id="btnEntrar" onclick="fazerLogin()">Entrar no Sistema</button>
        <div id="erro" class="error-message"></div>
    </div>

    <script>
        // Inicialização do Appwrite
        const { Client, Account } = Appwrite;
        const client = new Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('69f0c2ac0039982cc56a'); // ID confirmado em suas telas anteriores

        const account = new Account(client);

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnEntrar');
            const erroDiv = document.getElementById('erro');

            if (!email || !password) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            // Interface de carregamento
            btn.disabled = true;
            btn.innerText = "Verificando...";
            erroDiv.style.display = "none";

            try {
                // Método atualizado para a versão 14
                await account.createEmailPasswordSession(email, password);
                
                alert("Login realizado com sucesso!");
                window.location.href = "dashboard.html"; // Nome da sua página interna
            } catch (error) {
                console.error("Erro no login:", error);
                btn.disabled = false;
                btn.innerText = "Entrar no Sistema";
                erroDiv.style.display = "block";

                if (error.code === 401) {
                    erroDiv.innerText = "E-mail ou senha incorretos.";
                } else {
                    erroDiv.innerText = "Erro: " + error.message;
                }
            }
        }

        // Atalho: apertar Enter para logar
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fazerLogin();
        });
    </script>
</body>
</html>
