<!-- 1. Importação da Biblioteca (SDK) -->
<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>

<script>
    // 2. Inicialização do Cliente
    // Certifique-se de que o ID do projeto é exatamente esse que aparece no seu console
    const client = new Appwrite.Client()
        .setEndpoint('https://cloud.appwrite.io/v1') // Endpoint padrão
        .setProject('69f0c2ac0039982cc56a');        // Seu ID conforme image_eeb73f.jpg

    const account = new Appwrite.Account(client);

    // 3. Função de Login
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            // Cria a sessão de login
            await account.createEmailPasswordSession(email, password);
            alert("Login realizado com sucesso!");
            window.location.href = "dashboard.html"; // Altere para sua página principal
        } catch (error) {
            console.error("Erro no login:", error);
            alert("Erro ao entrar: " + error.message);
        }
    }
</script>
