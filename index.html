<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYOFNC - Sistema de Controle</title>
    
    <!-- Link alternativo para evitar o bloqueio de rastreamento do navegador -->
    <script src="https://www.unpkg.com/appwrite@14.0.1/dist/iife/sdk.bundle.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #c61d41; margin-bottom: 8px; font-size: 28px; }
        p { color: #666; margin-bottom: 24px; }
        input { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: #c61d41; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.3s; }
        button:hover { background-color: #a51836; }
        .error-msg { color: #d93025; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>CRYOFNC</h1>
        <p>Acesso Cryotronics</p>
        
        <input type="email" id="email" placeholder="E-mail de acesso" required>
        <input type="password" id="password" placeholder="Senha" required>
        
        <button id="loginBtn" onclick="fazerLogin()">Entrar no Sistema</button>
        <div id="mensagemErro" class="error-msg"></div>
    </div>

    <script>
        // Inicialização do Appwrite
        // O ID do projeto foi retirado da sua URL no Appwrite (image_eeb73f.jpg)
        const { Client, Account } = Appwrite;
        const client = new Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('69f0c2ac0039982cc56a');

        const account = new Account(client);

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msgErro = document.getElementById('mensagemErro');

            if (!email || !password) {
                alert("Preencha todos os campos corretamente.");
                return;
            }

            // Desabilita o botão para evitar múltiplos cliques
            btn.disabled = true;
            btn.innerText = "Verificando...";
            msgErro.style.display = "none";

            try {
                // Comando obrigatório para a versão mais recente do Appwrite
                await account.createEmailPasswordSession(email, password);
                
                alert("Login realizado! Redirecionando...");
                // Nome da sua página interna (ajuste se for outro nome)
                window.location.href = "dashboard.html"; 

            } catch (error) {
                console.error("Erro detectado:", error);
                btn.disabled = false;
                btn.innerText = "Entrar no Sistema";
                msgErro.style.display = "block";

                if (error.code === 401) {
                    msgErro.innerText = "E-mail ou senha inválidos.";
                } else {
                    msgErro.innerText = "Erro de conexão: " + error.message;
                }
            }
        }

        // Permite usar a tecla 'Enter' para logar
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });
    </script>
</body>
</html>
