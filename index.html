<script>
    // 1. Primeiro definimos as variáveis
    let client, account;

    // 2. Criamos uma função para inicializar tudo assim que a página carregar
    function inicializarAppwrite() {
        try {
            client = new Appwrite.Client()
                .setEndpoint('https://cloud.appwrite.io/v1')
                .setProject('69f0c2ac0039982cc56a');

            account = new Appwrite.Account(client);
            console.log("Appwrite carregado com sucesso!");
        } catch (e) {
            console.error("Erro ao inicializar Appwrite:", e);
        }
    }

    // Executa a inicialização
    inicializarAppwrite();

    async function fazerLogin() {
        // Verifica se a variável 'account' foi inicializada
        if (!account) {
            alert("O sistema ainda está carregando. Aguarde um segundo e tente novamente.");
            return;
        }

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            await account.createEmailPasswordSession(email, password);
            window.location.href = "dashboard.html";
        } catch (error) {
            document.getElementById('mensagemErro').innerText = "Erro: " + error.message;
            document.getElementById('mensagemErro').style.display = "block";
        }
    }
</script>
